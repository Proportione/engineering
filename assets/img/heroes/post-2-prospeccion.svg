<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Raleway, Helvetica Neue, Arial, sans-serif">
  <style>
    .bg { fill: #5F322F; }
    .label { font-size: 14px; fill: #FFFFFF; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; }
    .title { font-size: 56px; fill: #FFFFFF; font-weight: 700; letter-spacing: -1.5px; }
    .subtitle { font-size: 22px; fill: #FFFFFF; font-weight: 400; letter-spacing: -0.3px; opacity: 0.85; }
    .accent { stroke: #FFFFFF; stroke-width: 3; fill: none; }
    .footer { font-size: 13px; fill: #FFFFFF; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; opacity: 0.65; }
  </style>

  <rect width="1200" height="630" class="bg"/>

  <!-- Top label -->
  <text x="80" y="100" class="label">Post 02 · Architecture</text>

  <!-- Divider line -->
  <line x1="80" y1="125" x2="180" y2="125" class="accent"/>

  <!-- Title (multi-line) -->
  <text x="80" y="265" class="title">Prospección B2B</text>
  <text x="80" y="335" class="title">industrial sin email frío:</text>
  <text x="80" y="405" class="title">cuatro herramientas y una regla</text>

  <!-- Subtitle -->
  <text x="80" y="465" class="subtitle">El pipeline real que usamos para descubrir, enriquecer</text>
  <text x="80" y="495" class="subtitle">y conversar con decisores en industria portuguesa.</text>

  <!-- Funnel accent (right side) -->
  <g transform="translate(900, 220)" opacity="0.4">
    <polygon points="0,0 220,0 200,30 20,30" fill="#FFFFFF"/>
    <polygon points="35,55 185,55 165,80 55,80" fill="#FFFFFF" opacity="0.7"/>
    <polygon points="80,105 140,105 120,130 100,130" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- Footer -->
  <text x="80" y="585" class="footer">engineering.proportione.com</text>
</svg>
