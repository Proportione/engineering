<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="Raleway, Helvetica Neue, Arial, sans-serif">
  <style>
    .title { font-size: 22px; fill: #1a1a1a; font-weight: 600; letter-spacing: -0.3px; }
    .subtitle { font-size: 14px; fill: #555; font-weight: 400; }
    .meta { font-size: 11px; fill: #888; letter-spacing: 2px; text-transform: uppercase; }
    .day { font-size: 11px; fill: #888; letter-spacing: 1px; text-transform: uppercase; }
    .step-title { font-size: 14px; fill: #1a1a1a; font-weight: 600; }
    .step-sub { font-size: 11px; fill: #666; font-weight: 400; }
    .channel-email { fill: #5F322F; }
    .channel-linkedin { fill: #3B431C; }
    .channel-content { fill: #6E8157; }
    .channel-text { fill: #FFFFFF; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .timeline { stroke: #AEADB3; stroke-width: 2; }
    .rule-box { fill: #FAF6F5; stroke: #5F322F; stroke-width: 1.5; }
    .rule-title { font-size: 13px; fill: #5F322F; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .rule-text { font-size: 13px; fill: #1a1a1a; font-weight: 400; }
  </style>

  <!-- Header -->
  <text x="60" y="55" class="meta">Exhibit 4 · Decisión 2</text>
  <text x="60" y="90" class="title">Cadencia dual: contenido primero, email después, LinkedIn al final</text>
  <text x="60" y="115" class="subtitle">Un decisor industrial nunca recibe nuestro primer mensaje sin haber visto contenido nuestro antes.</text>

  <!-- Timeline base -->
  <line x1="120" y1="280" x2="1140" y2="280" class="timeline"/>

  <!-- Day markers -->
  <g class="day-markers">
    <circle cx="180" cy="280" r="5" fill="#AEADB3"/>
    <text x="180" y="305" class="day" text-anchor="middle">Día 0</text>

    <circle cx="380" cy="280" r="5" fill="#AEADB3"/>
    <text x="380" y="305" class="day" text-anchor="middle">+ 1-3 d</text>

    <circle cx="600" cy="280" r="5" fill="#AEADB3"/>
    <text x="600" y="305" class="day" text-anchor="middle">+ 5-7 d</text>

    <circle cx="820" cy="280" r="5" fill="#AEADB3"/>
    <text x="820" y="305" class="day" text-anchor="middle">+ 12-14 d</text>

    <circle cx="1080" cy="280" r="5" fill="#AEADB3"/>
    <text x="1080" y="305" class="day" text-anchor="middle">+ 21 d</text>
  </g>

  <!-- Step 1: Content published -->
  <g transform="translate(120, 175)">
    <rect width="120" height="80" rx="3" class="channel-content"/>
    <text x="60" y="32" class="channel-text" text-anchor="middle">Contenido</text>
    <text x="60" y="60" fill="#FFFFFF" font-size="11" text-anchor="middle" opacity="0.85">post / artículo</text>
  </g>
  <text x="180" y="345" class="step-title" text-anchor="middle">Publicar primero</text>
  <text x="180" y="362" class="step-sub" text-anchor="middle">Blog, LinkedIn corporativo,</text>
  <text x="180" y="376" class="step-sub" text-anchor="middle">prensa sectorial</text>

  <!-- Step 2: Newsletter -->
  <g transform="translate(320, 175)">
    <rect width="120" height="80" rx="3" class="channel-email"/>
    <text x="60" y="32" class="channel-text" text-anchor="middle">Email</text>
    <text x="60" y="60" fill="#FFFFFF" font-size="11" text-anchor="middle" opacity="0.85">newsletter Brevo</text>
  </g>
  <text x="380" y="345" class="step-title" text-anchor="middle">Enviar contenido</text>
  <text x="380" y="362" class="step-sub" text-anchor="middle">a la lista del decisor.</text>
  <text x="380" y="376" class="step-sub" text-anchor="middle">Sin pitch, valor primero.</text>

  <!-- Decision diamond -->
  <g transform="translate(540, 215)">
    <polygon points="60,0 120,32 60,65 0,32" fill="#FAFAF7" stroke="#AEADB3" stroke-width="1.5"/>
    <text x="60" y="29" font-size="11" fill="#1a1a1a" font-weight="600" text-anchor="middle">¿Apertura</text>
    <text x="60" y="44" font-size="11" fill="#1a1a1a" font-weight="600" text-anchor="middle">o respuesta?</text>
  </g>

  <!-- Branch labels -->
  <text x="660" y="220" class="step-sub" fill="#5F322F" font-weight="600">Sí → seguir email</text>
  <text x="660" y="345" class="step-sub" fill="#1a1a1a" font-weight="600">No → activar LinkedIn</text>

  <!-- Step 3: Email follow-up -->
  <g transform="translate(740, 145)">
    <rect width="160" height="60" rx="3" class="channel-email"/>
    <text x="80" y="28" class="channel-text" text-anchor="middle">Email follow-up</text>
    <text x="80" y="48" fill="#FFFFFF" font-size="10" text-anchor="middle" opacity="0.85">contexto + propuesta</text>
  </g>

  <!-- Step 4: LinkedIn connect -->
  <g transform="translate(740, 220)">
    <rect width="160" height="60" rx="3" class="channel-linkedin"/>
    <text x="80" y="28" class="channel-text" text-anchor="middle">LinkedIn connect</text>
    <text x="80" y="48" fill="#FFFFFF" font-size="10" text-anchor="middle" opacity="0.85">SendPilot · sin pitch</text>
  </g>

  <!-- Step 5: LinkedIn message -->
  <g transform="translate(990, 220)">
    <rect width="160" height="60" rx="3" class="channel-linkedin"/>
    <text x="80" y="28" class="channel-text" text-anchor="middle">LinkedIn mensaje</text>
    <text x="80" y="48" fill="#FFFFFF" font-size="10" text-anchor="middle" opacity="0.85">contenido propio</text>
  </g>

  <!-- Rule box at bottom -->
  <rect x="60" y="420" width="1080" height="70" class="rule-box"/>
  <text x="80" y="448" class="rule-title">Regla operativa</text>
  <text x="80" y="475" class="rule-text">Primero Brevo, después SendPilot, nunca los dos a la vez. El único mensaje sin contenido previo es la conexión LinkedIn — y va sin pitch.</text>

  <!-- Footer -->
  <text x="60" y="525" class="meta" font-size="10">Fuente: Proportione · Cadencia operativa Q1 2026</text>
</svg>
