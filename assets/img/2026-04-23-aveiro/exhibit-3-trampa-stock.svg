<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Raleway, Helvetica Neue, Arial, sans-serif">
  <style>
    .title { font-size: 22px; fill: #1a1a1a; font-weight: 600; letter-spacing: -0.3px; }
    .subtitle { font-size: 14px; fill: #555; font-weight: 400; }
    .meta { font-size: 11px; fill: #888; letter-spacing: 2px; text-transform: uppercase; }
    .step-label { font-size: 11px; fill: #888; letter-spacing: 2px; text-transform: uppercase; }
    .step-title { font-size: 16px; fill: #1a1a1a; font-weight: 700; }
    .step-text { font-size: 13px; fill: #333; font-weight: 400; }
    .step-num { font-size: 30px; fill: #FFFFFF; font-weight: 700; letter-spacing: -1px; }
    .arrow-text { font-size: 11px; fill: #5F322F; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .step-1 { fill: #5F322F; }
    .step-2 { fill: #6E8157; }
    .step-3 { fill: #5F322F; }
    .step-4 { fill: #3B431C; }
    .arrow { stroke: #AEADB3; stroke-width: 2; fill: none; }
    .lesson-box { fill: #FAF6F5; stroke: #5F322F; stroke-width: 1.5; }
    .lesson-title { font-size: 12px; fill: #5F322F; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .lesson-text { font-size: 13px; fill: #1a1a1a; font-weight: 400; }
  </style>

  <!-- Header -->
  <text x="60" y="55" class="meta">Exhibit 3 · Trampa 1</text>
  <text x="60" y="90" class="title">Cuando la placa que eliges no es la que puedes comprar</text>
  <text x="60" y="115" class="subtitle">Un flip-flop documentado vale más que una decisión limpia falsa.</text>

  <!-- Step 1: Spec -->
  <g transform="translate(60, 170)">
    <circle cx="40" cy="40" r="40" class="step-1"/>
    <text x="40" y="50" class="step-num" text-anchor="middle">1</text>
    <text x="100" y="25" class="step-label">Especificación inicial</text>
    <text x="100" y="50" class="step-title">Placa A (consumer-server)</text>
    <text x="100" y="72" class="step-text">10 GbE integrado, mejor coste/feature.</text>
    <text x="100" y="90" class="step-text">Decisión basada en hoja de cálculo.</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 60 290 L 60 320" class="arrow" marker-end="url(#arr)"/>
  <text x="80" y="310" class="arrow-text">Validación externa</text>

  <!-- Step 2: Validation -->
  <g transform="translate(60, 330)">
    <circle cx="40" cy="40" r="40" class="step-2"/>
    <text x="40" y="50" class="step-num" text-anchor="middle">2</text>
    <text x="100" y="25" class="step-label">Cambio a placa B</text>
    <text x="100" y="50" class="step-title">Placa B (server-grade puro)</text>
    <text x="100" y="72" class="step-text">Dos bugs documentados de A en foro Proxmox:</text>
    <text x="100" y="90" class="step-text">passthrough de GPU + NIC integrada vanish.</text>
  </g>

  <!-- Step 3: Stock reality (right column) -->
  <g transform="translate(660, 170)">
    <circle cx="40" cy="40" r="40" class="step-3"/>
    <text x="40" y="50" class="step-num" text-anchor="middle">3</text>
    <text x="100" y="25" class="step-label">Compra real</text>
    <text x="100" y="50" class="step-title">Vuelta a placa A</text>
    <text x="100" y="72" class="step-text">Placa B sin stock 6-8 semanas.</text>
    <text x="100" y="90" class="step-text">A en stock, envío inmediato.</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M 660 290 L 660 320" class="arrow" marker-end="url(#arr)"/>
  <text x="680" y="310" class="arrow-text">Plan de mitigación</text>

  <!-- Step 4: Mitigation -->
  <g transform="translate(660, 330)">
    <circle cx="40" cy="40" r="40" class="step-4"/>
    <text x="40" y="50" class="step-num" text-anchor="middle">4</text>
    <text x="100" y="25" class="step-label">Mitigación específica</text>
    <text x="100" y="50" class="step-title">Bugs neutralizados al montar</text>
    <text x="100" y="72" class="step-text">BIOS + BMC al último firmware (corrige bug 1).</text>
    <text x="100" y="90" class="step-text">NIC PCIe Intel a mano como salvaguarda.</text>
  </g>

  <!-- Horizontal flow arrow connecting columns -->
  <path d="M 480 210 L 660 210" class="arrow" marker-end="url(#arr)" stroke-dasharray="6,4"/>
  <text x="570" y="200" class="arrow-text" text-anchor="middle">Realidad de stock</text>

  <!-- Lesson box at bottom -->
  <rect x="60" y="465" width="1080" height="85" class="lesson-box"/>
  <text x="80" y="491" class="lesson-title">Lección operativa</text>
  <text x="80" y="513" class="lesson-text">Una decisión de hardware sin verificar disponibilidad real es solo una preferencia.</text>
  <text x="80" y="533" class="lesson-text">Cambiar de opinión está bien — siempre que el motivo se documente donde el yo del futuro pueda releerlo.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#AEADB3"/>
    </marker>
  </defs>
</svg>
