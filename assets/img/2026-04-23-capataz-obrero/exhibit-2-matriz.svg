<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="Raleway, Helvetica Neue, Arial, sans-serif">
  <style>
    .title { font-size: 22px; fill: #1a1a1a; font-weight: 600; letter-spacing: -0.3px; }
    .subtitle { font-size: 14px; fill: #555; font-weight: 400; }
    .meta { font-size: 11px; fill: #888; letter-spacing: 2px; text-transform: uppercase; }
    .col-header { font-size: 14px; fill: #FFFFFF; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .row-label { font-size: 13px; fill: #1a1a1a; font-weight: 600; }
    .row-sub { font-size: 11px; fill: #888; font-weight: 400; }
    .cell-text { font-size: 12px; fill: #333; font-weight: 400; }
    .cell-strong { font-size: 13px; fill: #1a1a1a; font-weight: 600; }
    .col-obrero { fill: #3B431C; }
    .col-pipeline { fill: #6E8157; }
    .col-capataz { fill: #5F322F; }
    .row-bg { fill: #FAFAF7; }
    .row-bg-alt { fill: #FFFFFF; }
  </style>

  <!-- Header -->
  <text x="60" y="55" class="meta">Exhibit 2 · Reparto de tareas</text>
  <text x="60" y="90" class="title">Qué tarea va a quién</text>
  <text x="60" y="115" class="subtitle">Criterio de éxito objetivo + formato estable = obrero. Juicio sobre el qué = capataz.</text>

  <!-- Column headers -->
  <rect x="380" y="155" width="250" height="55" class="col-obrero"/>
  <text x="505" y="180" class="col-header" text-anchor="middle">Obrero</text>
  <text x="505" y="200" fill="#FFFFFF" font-size="11" text-anchor="middle" opacity="0.9">LLM local · Qwen 14B</text>

  <rect x="630" y="155" width="250" height="55" class="col-pipeline"/>
  <text x="755" y="180" class="col-header" text-anchor="middle">Pipeline</text>
  <text x="755" y="200" fill="#FFFFFF" font-size="11" text-anchor="middle" opacity="0.9">Capataz delega + revisa</text>

  <rect x="880" y="155" width="260" height="55" class="col-capataz"/>
  <text x="1010" y="180" class="col-header" text-anchor="middle">Capataz</text>
  <text x="1010" y="200" fill="#FFFFFF" font-size="11" text-anchor="middle" opacity="0.9">Frontier · Claude Code</text>

  <!-- Row 1 -->
  <rect x="60" y="210" width="1080" height="50" class="row-bg"/>
  <text x="80" y="232" class="row-label">Clasificar tickets entrantes</text>
  <text x="80" y="248" class="row-sub">Taxonomía cerrada, salida estructurada</text>
  <text x="505" y="240" class="cell-strong" text-anchor="middle">●</text>
  <text x="755" y="240" class="cell-text" text-anchor="middle">—</text>
  <text x="1010" y="240" class="cell-text" text-anchor="middle">—</text>

  <!-- Row 2 -->
  <rect x="60" y="260" width="1080" height="50" class="row-bg-alt"/>
  <text x="80" y="282" class="row-label">Extraer entidades de un correo libre</text>
  <text x="80" y="298" class="row-sub">Formato estable, criterio objetivo</text>
  <text x="505" y="290" class="cell-strong" text-anchor="middle">●</text>
  <text x="755" y="290" class="cell-text" text-anchor="middle">—</text>
  <text x="1010" y="290" class="cell-text" text-anchor="middle">—</text>

  <!-- Row 3 -->
  <rect x="60" y="310" width="1080" height="50" class="row-bg"/>
  <text x="80" y="332" class="row-label">Generar 30 variantes de copy A/B</text>
  <text x="80" y="348" class="row-sub">Plantilla del capataz, ejecución masiva</text>
  <text x="505" y="340" class="cell-text" text-anchor="middle">—</text>
  <text x="755" y="340" class="cell-strong" text-anchor="middle">●</text>
  <text x="1010" y="340" class="cell-text" text-anchor="middle">—</text>

  <!-- Row 4 -->
  <rect x="60" y="360" width="1080" height="50" class="row-bg-alt"/>
  <text x="80" y="382" class="row-label">Resumir 50 logs por categoría</text>
  <text x="80" y="398" class="row-sub">Lote grande, criterio fijo, formato estable</text>
  <text x="505" y="390" class="cell-text" text-anchor="middle">—</text>
  <text x="755" y="390" class="cell-strong" text-anchor="middle">●</text>
  <text x="1010" y="390" class="cell-text" text-anchor="middle">—</text>

  <!-- Row 5 -->
  <rect x="60" y="410" width="1080" height="50" class="row-bg"/>
  <text x="80" y="432" class="row-label">Decidir si un PR introduce regresión arquitectónica</text>
  <text x="80" y="448" class="row-sub">Requiere entender repo + intención del autor</text>
  <text x="505" y="440" class="cell-text" text-anchor="middle">—</text>
  <text x="755" y="440" class="cell-text" text-anchor="middle">—</text>
  <text x="1010" y="440" class="cell-strong" text-anchor="middle">●</text>

  <!-- Row 6 -->
  <rect x="60" y="460" width="1080" height="50" class="row-bg-alt"/>
  <text x="80" y="482" class="row-label">Diseñar módulo nuevo desde cero</text>
  <text x="80" y="498" class="row-sub">Razonamiento amplio, contexto largo</text>
  <text x="505" y="490" class="cell-text" text-anchor="middle">—</text>
  <text x="755" y="490" class="cell-text" text-anchor="middle">—</text>
  <text x="1010" y="490" class="cell-strong" text-anchor="middle">●</text>

  <!-- Row 7 -->
  <rect x="60" y="510" width="1080" height="50" class="row-bg"/>
  <text x="80" y="532" class="row-label">Refactor: renombrar 40 variables coherentemente</text>
  <text x="80" y="548" class="row-sub">Mecánico pero con contexto del repo</text>
  <text x="505" y="540" class="cell-text" text-anchor="middle">—</text>
  <text x="755" y="540" class="cell-strong" text-anchor="middle">●</text>
  <text x="1010" y="540" class="cell-text" text-anchor="middle">—</text>

  <!-- Footer -->
  <text x="60" y="600" class="meta" font-size="10">Fuente: Proportione · Reparto operativo Q2 2026 · Reglas no exhaustivas</text>
</svg>
